<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Offline - Yen-Go</title>
    <style>
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --text-primary: #eee;
        --text-secondary: #aaa;
        --accent: #e94560;
        --accent-light: #ff6b6b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      .container {
        max-width: 480px;
        width: 100%;
      }

      .icon {
        width: 120px;
        height: 120px;
        margin: 0 auto 32px;
        position: relative;
      }

      .icon-circle {
        width: 100%;
        height: 100%;
        border: 4px solid var(--text-secondary);
        border-radius: 50%;
        position: relative;
      }

      .icon-diagonal {
        position: absolute;
        top: 50%;
        left: -10%;
        width: 120%;
        height: 4px;
        background: var(--accent);
        transform: rotate(-45deg);
        transform-origin: center;
      }

      .icon-wifi {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 48px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 300;
        margin-bottom: 16px;
        color: var(--text-primary);
      }

      p {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin-bottom: 32px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 28px;
        font-size: 1rem;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
      }

      .btn-primary {
        background-color: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-light);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-secondary:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .cached-content {
        margin-top: 48px;
        padding-top: 32px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .cached-content h2 {
        font-size: 1.2rem;
        font-weight: 400;
        margin-bottom: 16px;
        color: var(--text-secondary);
      }

      .cached-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .cached-list li a {
        display: block;
        padding: 12px 16px;
        background: var(--bg-secondary);
        border-radius: 8px;
        color: var(--text-primary);
        text-decoration: none;
        transition: background 0.2s ease;
      }

      .cached-list li a:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .status {
        margin-top: 48px;
        padding: 16px;
        background: var(--bg-secondary);
        border-radius: 8px;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      .status-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        margin-right: 8px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .online .status-indicator {
        background: #4caf50;
        animation: none;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.5rem;
        }

        p {
          font-size: 1rem;
        }

        .icon {
          width: 80px;
          height: 80px;
        }

        .icon-wifi {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <div class="icon-circle">
          <span class="icon-wifi">📶</span>
          <div class="icon-diagonal"></div>
        </div>
      </div>

      <h1>You're Offline</h1>
      <p>
        It looks like you've lost your internet connection. 
        Don't worry - many features of Yen-Go work offline!
      </p>

      <div class="actions">
        <button class="btn btn-primary" onclick="location.reload()">
          ↻ Try Again
        </button>
        <a href="/" class="btn btn-secondary">
          ← Go to Home (Cached)
        </a>
      </div>

      <div class="cached-content" id="cached-content" style="display: none;">
        <h2>Available Offline</h2>
        <ul class="cached-list" id="cached-list">
          <!-- Populated by JavaScript -->
        </ul>
      </div>

      <div class="status" id="status">
        <span class="status-indicator"></span>
        <span id="status-text">Waiting for connection...</span>
      </div>
    </div>

    <script>
      // Check cached pages
      async function checkCachedPages() {
        if ('caches' in window) {
          try {
            const cacheNames = await caches.keys();
            const pages = [];
            
            for (const cacheName of cacheNames) {
              const cache = await caches.open(cacheName);
              const requests = await cache.keys();
              
              for (const request of requests) {
                const url = new URL(request.url);
                if (url.pathname === '/' || url.pathname.endsWith('.html')) {
                  pages.push({
                    name: url.pathname === '/' ? 'Home' : url.pathname.replace('.html', ''),
                    url: url.pathname
                  });
                }
              }
            }
            
            if (pages.length > 0) {
              const cachedContent = document.getElementById('cached-content');
              const cachedList = document.getElementById('cached-list');
              
              // Remove duplicates
              const uniquePages = pages.filter((page, index, self) =>
                index === self.findIndex(p => p.url === page.url)
              );
              
              cachedList.innerHTML = uniquePages
                .map(page => `<li><a href="${page.url}">${page.name}</a></li>`)
                .join('');
              
              cachedContent.style.display = 'block';
            }
          } catch (error) {
            console.warn('Error checking cached pages:', error);
          }
        }
      }

      // Monitor connection status
      function updateConnectionStatus() {
        const statusElement = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        
        if (navigator.onLine) {
          statusElement.classList.add('online');
          statusText.textContent = 'Connection restored! Reloading...';
          setTimeout(() => location.reload(), 1500);
        } else {
          statusElement.classList.remove('online');
          statusText.textContent = 'Waiting for connection...';
        }
      }

      // Event listeners
      window.addEventListener('online', updateConnectionStatus);
      window.addEventListener('offline', updateConnectionStatus);

      // Initial checks
      checkCachedPages();
      updateConnectionStatus();
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yen-Go - Redirecting...</title>
    <script>
      // SPA redirect for GitHub Pages
      // This script handles deep links by redirecting to index.html with the path encoded
      // Based on spa-github-pages pattern: https://github.com/rafgraph/spa-github-pages
      
      (function() {
        // Number of path segments to keep (1 for /yen-go/)
        var pathSegmentsToKeep = 1;
        
        var l = window.location;
        var pathSegments = l.pathname.split('/');
        
        // Keep the repository name segment (/yen-go/)
        var keepPath = pathSegments.slice(0, pathSegmentsToKeep + 1).join('/');
        var redirectPath = pathSegments.slice(pathSegmentsToKeep + 1).join('/');
        
        // Redirect to index with path encoded in query string
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          keepPath + '/?' +
          (redirectPath ? 'p=' + encodeURIComponent('/' + redirectPath) : '') +
          (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body>
    <noscript>
      <p>Redirecting to <a href="/yen-go/">Yen-Go</a>...</p>
    </noscript>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SPA redirect receiver — restores deep-link path from 404.html redirect.
         On GitHub Pages, unknown paths serve 404.html which redirects to
         /?p=/original/path. This script must run synchronously before the
         app boots so that window.location reflects the intended URL. -->
    <script>
      (function () {
        var params = {};
        window.location.search.slice(1).split('&').forEach(function (s) {
          var kv = s.split('=');
          if (kv[0]) params[kv[0]] = decodeURIComponent(kv[1] || '');
        });
        if (params.p) {
          var base = '/yen-go';
          var url = base + params.p + (params.q ? '?' + params.q : '') + window.location.hash;
          window.history.replaceState(null, '', url);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="yen·go — Offline Go puzzle platform for practicing tsumego" />
    <meta name="theme-color" content="#3B6D96" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="yen·go" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/yen-go/favicon.ico" />
    <link rel="apple-touch-icon" href="/yen-go/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/yen-go/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/yen-go/icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/yen-go/icon-167.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Prefetch tags config for fast loading -->
    <link rel="prefetch" href="/yen-go/config/tags.json" as="fetch" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap"></noscript>
    <title>yen·go — Go Puzzles</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

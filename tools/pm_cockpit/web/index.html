<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>pm_cockpit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-9" data-run-active="false">

  <header class="border-b border-zinc-800/60 bg-zinc-900/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
      <h1 class="text-lg font-semibold tracking-tight">pm_cockpit</h1>
      <nav class="flex gap-1 text-sm" id="tabs">
        <button data-tab="overview"    class="tab px-3 py-1.5 rounded hover:bg-slate-800">Overview</button>
        <button data-tab="adapters"    class="tab px-3 py-1.5 rounded hover:bg-slate-800">Adapters</button>
        <button data-tab="run"         class="tab px-3 py-1.5 rounded hover:bg-slate-800">Live Run</button>
        <button data-tab="maintenance" class="tab px-3 py-1.5 rounded hover:bg-slate-800">Maintenance</button>
        <button data-tab="history"     class="tab px-3 py-1.5 rounded hover:bg-slate-800">History</button>
      </nav>
      <!-- One "System" pill in the header. Real alarms live in #alarm-bar. -->
      <div class="ml-auto text-xs text-slate-400 flex items-center gap-2">
        <button id="system-pill" type="button"
                class="pill bg-slate-800 text-slate-300"
                aria-haspopup="dialog"
                title="Click for system details">
          <span class="glyph"></span>System
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6">
    <section id="view-overview"    class="view"></section>
    <section id="view-adapters"    class="view hidden"></section>
    <section id="view-run"         class="view hidden"></section>
    <section id="view-maintenance" class="view hidden"></section>
    <section id="view-history"     class="view hidden"></section>
  </main>

  <footer class="max-w-7xl mx-auto px-6 py-4 text-xs text-slate-500">
    Localhost only · pure presentation over <code>backend.puzzle_manager</code>.
  </footer>

  <!-- System popover (toggled by #system-pill). -->
  <dialog id="system-dialog" class="pmc-dialog">
    <form method="dialog">
      <h3>System</h3>
      <dl id="system-readings" class="text-sm grid grid-cols-[7rem_1fr] gap-y-1 gap-x-3"></dl>
      <p class="text-[11px] text-slate-500" id="system-refreshed"></p>
      <div class="actions">
        <button value="close" class="rounded px-3 py-1 text-sm bg-slate-800 hover:bg-slate-700">Close</button>
      </div>
    </form>
  </dialog>

  <!-- Generic confirmation dialog (typed-verb gate). -->
  <dialog id="confirm-dialog" class="pmc-dialog">
    <form method="dialog">
      <h3 id="cd-title">Confirm action</h3>
      <p id="cd-body"></p>
      <label class="text-xs text-slate-400">
        Type <code id="cd-verb" class="text-rose-300"></code> to confirm
        <input id="cd-input" type="text" autocomplete="off" spellcheck="false" />
      </label>
      <div class="actions">
        <button value="cancel" class="rounded px-3 py-1 text-sm bg-slate-800 hover:bg-slate-700">Cancel</button>
        <button id="cd-go" value="ok" disabled
                class="rounded px-3 py-1 text-sm bg-rose-500/15 text-rose-300 ring-1 ring-rose-500/40
                       disabled:opacity-40 disabled:pointer-events-none">Proceed</button>
      </div>
    </form>
  </dialog>

  <!-- Toast region (in-flight feedback). -->
  <div id="toast-region" role="status" aria-live="polite"></div>

  <!-- Sticky bottom status strip (single source of escalation; painted by app.js). -->
  <div id="status-strip" role="status" aria-live="polite" aria-atomic="true"
       class="fixed bottom-0 inset-x-0 z-40 h-9 px-4 flex items-center gap-3 text-xs font-medium
              bg-zinc-950/90 backdrop-blur-sm ring-1 ring-white/5
              transition-transform duration-200 ease-out"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>

# Puzzle Enrichment Lab — KataGo Analysis Config
# Optimized for tsumego (life-and-death) puzzle analysis
#
# Design principles (consulted with professional Go player perspective):
#
# 1. DEEP LOCAL READING over broad search
#    Tsumego requires reading 10-20+ moves deep in a small area.
#    We want deep, accurate reading — not wide exploration of the whole board.
#
# 2. MINIMAL WIDE ROOT NOISE
#    Unlike game analysis where you want to evaluate many candidate moves,
#    tsumego usually has 1-3 critical moves. Don't waste visits on obviously
#    wrong moves far from the puzzle area.
#
# 3. OWNERSHIP OUTPUT
#    The ownership head is critical for tsumego — it directly tells us
#    which groups are alive/dead after each candidate move.
#
# 4. NO TIME LIMITS
#    We're doing batch enrichment, not real-time play. Let visits be the
#    only constraint.
#
# 5. CONSERVATIVE PASSES
#    Never assume a pass ends the game — tsumego positions are incomplete
#    board states where passing is usually wrong.

# Logs ------------------------------------------------------------------------------------
# Relative to lab root (tools/puzzle-enrichment-lab/), which is pinned as CWD when
# KataGo is spawned from local_subprocess.py. Also overridden to an absolute path
# via -override-config at runtime, so this value is a safe fallback only.
logDir = .lab-runtime/katago-logs
logToStderr = true
warnUnusedFields = true

# Analysis ---------------------------------------------------------------------------------

# Length of the principal variation (solution line)
# Report PV (principal variation) up to N moves deep
# Tsumego solutions are typically 3-15 moves, so 20 is sufficient
# Tsumego often requires long forced sequences.
analysisPVLen = 30

# Report winrates from the current side-to-move's perspective. Makes tsumego analysis intuitive.
# Under SIDETOMOVE, KataGo reports winrate from the perspective of the player
# whose turn it is. This matches the code's normalize_winrate() contract.
# Previously set to BLACK (which caused perspective mismatches in the pipeline).
reportAnalysisWinratesAs = SIDETOMOVE

# Moderate wide root noise — explore enough moves for validation while maintaining depth.
# Default is 0.04; we use 0.03 as a balance between exploration and depth for tsumego.
# At 200-500 visits, 0.01 is too tight — correct moves get 0 visits.
# At 0.03, KataGo explores the top ~8-12 moves deeply.
wideRootNoise = 0.02

# Ignore pre-root history — 
# To Preserve ko history before root position is discarded. Set false if puzzles involve ko
ignorePreRootHistory = false

# Passing and cleanup ----------------------------------------------------------------------

# Always be conservative about passes — in tsumego, passing means death
conservativePass = true
# Don't enter cleanup phase — not relevant for tsumego
preventCleanupPhase = true

# Search limits ----------------------------------------------------------------------------

# Default max visits per query (can be overridden per-request)
#   - Deep enough to read most SDK-level puzzles correctly
#   - Fast enough for interactive use (~0.5-2s on Intel Iris Xe)
#   - Can increase higher for dan-level puzzles
# Maximum number of search visits per analysis.
# Increase for harder puzzles (100k, 200k). Decrease for quick checks.
# Range: 10000 - 500000
# If you this is increased increate analysisPVLen to a higher value
maxVisits = 5000

# No time limit — let visits be the constraint
# maxTime = 60

# Search threads ---------------------------------------------------------------------------

# For interactive single-puzzle analysis (one puzzle at a time):
#   - 1 analysis thread with more search threads = faster individual results
#
# For batch processing (many puzzles):
#   - More analysis threads with fewer search threads per = higher throughput
#
# Intel Iris Xe (integrated GPU, OpenCL):
#   - Conservative settings for stability
#   - Total threads = 2 * 8 = 16 (appropriate for integrated GPU)
#   - A5 fix: Aligned search threads with batch size to eliminate GPU stalls.
#     Previously numSearchThreadsPerAnalysisThread=10 with nnMaxBatchSize=8,
#     meaning 2 threads per analysis always waited for a batch slot.
numAnalysisThreads = 2
numSearchThreadsPerAnalysisThread = 8

# should be numAnalysisThreads * numSearchThreadsPerAnalysisThread
# Batch size — P2.7 fix: must be >= numSearchThreadsPerAnalysisThread * numAnalysisThreads
# Previous value (8) was less than total search threads (2 * 8 = 16),
# causing KataGo to warn about serialization bottleneck.
nnMaxBatchSize = 16

# Neural net cache — 2^20 = ~1M entries, reasonable for tsumego
# Tsumego has many transpositions (same position reached via different move orders)
# so caching helps significantly
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 15

# Randomize orientation 
# Randomize board orientation when running neural net evals?
nnRandomize = false

# Fixes some bugs due to move pass
enablePassingHacks = true

# Default symmetries — moderate default for fast iteration.
# A8: Lab mode and profiles override this per-query via
# overrideSettings.rootNumSymmetriesToSample in the JSON payload
# (set from config/katago-enrichment.json lab_mode.root_num_symmetries_to_sample).
# The .cfg default of 2 is used when no per-query override is sent.
rootNumSymmetriesToSample = 2



# -------------------------------------------------------
# UTILITY / SCORE WEIGHTING
# -------------------------------------------------------

# Weight given to static score estimate.
# Small value preserves seki detection sensitivity without distorting L&D binary judgment.
# Design intent: winLoss=1.0 : staticScore=0.1 : dynamicScore=0.1 ratio.
staticScoreUtilityFactor = 0.1

# Allows score importance to adjust during search.
# Range: 0.0 - 1.0 (0.3 works with staticScoreUtilityFactor)
dynamicScoreUtilityFactor = 0.1

# Weight for win/loss outcome.
# Keep at 1.0 to prioritize life/death over score.
winLossUtilityFactor = 1.0

# -------------------------------------------------------
# CONFIDENCE / STABILITY
# -------------------------------------------------------

# Use Lower Confidence Bound(LCB) for selecting moves.
# Helps avoid unstable lines with insufficient visits.
# Strongly recommended for tsumego.
useLcbForSelection = true

# Controls how strongle LCB penalizes under-explored moves
# Default around 1.0(very weak). For Tsueemo we recommend 6.0 to ensure engine prefers well-verified lines
lcbStdevs = 5

# Minimum visit proportion before LCB applies.
# Prevents LCB from affecting moves with too few visits.
# Range: 0.05 - 0.3 (0.15 is balanced)
minVisitPropForLCB = 0.15

# FPU (First Play Urgency) reduction.
# Lowers optimism for unexplored moves. Makes engine skeptical,
# forcing verification of candidate moves. Complements LCB.
# Lower = more pessimistic. Default is ~0.25.
# Range: 0.05 - 0.3 (try 0.15)
fpuReductionMax = 0.15

# Root-specific FPU reduction (if you want separate control).
# Usually set same as fpuReductionMax.
# Non-zero suppresses root exploration; missing the correct tsumego move is unrecoverable 
# retain full exploration at root
rootFpuReductionMax = 0

# Enable graph-based transposition detection.
# Merges search trees when different move orders lead to same position.
# Avoids redundant analysis, improves efficiency.
# Recommended: true
useGraphSearch = true

# Enable uncertainty-based search.
# Focuses extra visits on high-variance lines (where tsumego tricks hide).
# Use with uncertaintyCoeff.
useUncertainty = true

# Coefficient controlling how much to bias toward uncertain lines.
# Higher = more exploration of unsettled variations.
# Range: 0.25 - 1
uncertaintyCoeff = 0.5


# Rules ------------------------------------------------------------------------------------

# Chinese rules are the default and work well for tsumego
# (Japanese rules would also work; the difference doesn't matter for life/death)

# Komi doesn't matter for tsumego (we're looking at local life/death, not score)
# but we set it to standard 7.5 for consistency
# -------------------------------------------------------
# RULE INTERPRETATION
# -------------------------------------------------------

# Prevents misinterpretation of tsumego starting positions as handicap.
# Must be false for tsumego.
assumeMultipleStartingBlackMovesAreHandicap = false


# -------------------------------------------------------
# EXPLORATION CONTROL
# -------------------------------------------------------

# Controls exploration vs exploitation trade-off.
# 1.0 = KataGo default (neutral). Combined with rootPolicyTemperature=1.0
# to fix the "double exploration suppression" issue (both were 0.7).
cpuctExploration = 1.0

# Bias correction stabilizes value estimates across deep transpositions.
# 0.25 reduces value overestimation in deep trees (expert consensus range 0.15-0.3).
subtreeValueBiasFactor = 0.25

# Disable random exploration noise for deterministic analysis.
# Keep false for tsumego to get repeatable results.
rootNoiseEnabled = false

# Temperature applied to root policy.
# 1.0 = neutral (uses policy probabilities as-is). Paired with cpuctExploration=1.0
# to fix "double exploration suppression" (both were previously 0.7).
rootPolicyTemperature = 1.0


# Early temperature for the root (applies only during first ~30 visits).
# 1.5 boosts discovery of low-prior tesuji moves (sacrifice, throw-in) that would
# otherwise get zero visits at T0/T1. Decays to rootPolicyTemperature after warm-up.
# Tsumego Expert recommendation: 3x more early visits for <1% policy moves.
rootPolicyTemperatureEarly = 1.5

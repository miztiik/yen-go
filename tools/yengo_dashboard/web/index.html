<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Yen-Go Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Inter variable font with optical sizing (2026 spec) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&display=swap" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icon system: <i data-lucide="name"></i> + lucide.createIcons() -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Markdown renderer for the Guide tab -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.js"></script>
  <link rel="stylesheet" href="/styles.css" />
  <!-- Pre-paint theme attr (avoids FOUC flicker between light/dark on reload). -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("yengo-dashboard:theme");
        var theme = (saved === "dark" || saved === "light") ? saved : "light";
        document.documentElement.dataset.theme = theme;
      } catch (_) { /* private mode etc. */ }
    })();
  </script>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen overflow-hidden flex" data-run-active="false" data-theme="light">
  <!-- Sync body[data-theme] from the pre-paint <head> script. CSS targets
       body[data-theme=...] (60+ selectors), so we mirror the persisted value
       onto body before any visible content paints. Without this, dark
       theme persistence breaks because body keeps its inline 'light'. -->
  <script>
    (function () {
      try {
        var t = document.documentElement.dataset.theme;
        if (t === "dark" || t === "light") document.body.dataset.theme = t;
      } catch (_) { /* ignore */ }
    })();
  </script>

  <!-- ===== LEFT SIDEBAR ===== -->
  <nav id="sidebar" class="w-[220px] flex-shrink-0 border-r border-zinc-800/80 bg-zinc-950/80 flex flex-col">
    <!-- Brand block -->
    <div class="px-5 py-5 border-b border-zinc-800/60">
      <h1 class="brand-wordmark" aria-label="Yen-Go Dashboard">
        <span class="brand-mark">Yen-Go</span>
        <span class="brand-sub">Dashboard</span>
      </h1>
      <p class="text-[11px] text-zinc-600 mt-1 tracking-wide uppercase">puzzle pipeline</p>
    </div>

    <!-- Nav items -->
    <ul class="flex-1 py-3" id="nav-list">
      <li><button data-nav="library"  class="nav-item">
        <i data-lucide="layers"></i><span>Library</span>
      </button></li>
      <li><button data-nav="pipeline" class="nav-item">
        <i data-lucide="git-branch"></i><span>Pipeline</span>
      </button></li>
      <li><button data-nav="daily" class="nav-item">
        <i data-lucide="calendar"></i><span>Daily</span>
      </button></li>
      <li><button data-nav="activity" class="nav-item">
        <i data-lucide="activity"></i><span>Activity</span>
      </button></li>
      <li><button data-nav="operations" class="nav-item">
        <i data-lucide="wrench"></i><span>Operations</span>
      </button></li>
      <li><button data-nav="logs" class="nav-item">
        <i data-lucide="scroll-text"></i><span>Logs</span>
      </button></li>
      <li><button data-nav="guide"    class="nav-item">
        <i data-lucide="book-open"></i><span>Guide</span>
      </button></li>
    </ul>

    <!-- Theme toggle (System status moved to the top header chip; the bottom
         status strip still escalates warn/error severities). -->
    <div class="border-t border-zinc-800/60 px-3 py-3">
      <button id="theme-toggle"
              class="theme-toggle"
              type="button"
              aria-label="Toggle light/dark theme"
              title="Toggle light/dark theme">
        <i data-lucide="sun" id="theme-toggle-icon"></i>
        <span id="theme-toggle-label">Dark theme</span>
      </button>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT COLUMN ===== -->
  <div class="flex flex-col flex-1 min-w-0">
    <!-- Top header — system status chip lives here so it is always visible
         without burying it in the bottom-left corner. Click opens the
         existing system dialog (same target as the bottom strip). -->
    <header id="top-header"
            class="flex-shrink-0 h-12 px-6 flex items-center justify-between
                   bg-zinc-950/80 border-b border-zinc-800/60 backdrop-blur">
      <div id="page-breadcrumb" class="text-xs text-zinc-500 uppercase tracking-wider"></div>
      <form id="puzzle-search-form" class="flex items-center gap-1" data-puzzle-search>
        <input id="puzzle-search-input"
               type="search"
               name="puzzle_id"
               placeholder="Puzzle ID (16-hex or YENGO-…)"
               aria-label="Look up puzzle by ID"
               class="text-xs px-2 py-1 rounded border border-zinc-700 bg-zinc-900 text-zinc-100 w-[280px] font-mono"
               data-puzzle-search-input />
        <button type="submit"
                class="text-xs px-2 py-1 rounded border border-sky-700 text-sky-300 hover:bg-sky-900/30"
                data-puzzle-search-submit>Open</button>
      </form>
      <button id="system-chip"
              type="button"
              aria-haspopup="dialog"
              aria-label="Open system status dialog"
              title="Click for full system details"
              class="system-chip"
              data-sev="ok">
        <span class="system-chip-dot" aria-hidden="true"></span>
        <span class="system-chip-label" id="system-chip-label">starting…</span>
        <span class="system-chip-meta" id="system-chip-meta"></span>
      </button>
    </header>

    <main id="page-content" class="flex-1 overflow-auto px-8 py-6">
      <!-- Library = overview + adapters stacked -->
      <section id="view-overview"    class="view"></section>
      <section id="view-adapters"    class="view"></section>
      <!-- Pipeline = run + history stacked -->
      <section id="view-run"         class="view hidden"></section>
      <section id="view-history"     class="view hidden"></section>
      <!-- Activity = unified timeline (Theme 13b) -->
      <section id="view-activity"    class="view hidden"></section>
      <!-- Daily = daily-challenge surface (Theme 8) -->
      <section id="view-daily"       class="view hidden"></section>
      <!-- Operations = maintenance -->
      <section id="view-maintenance" class="view hidden"></section>
      <!-- Logs = stage logs + audit (publish-log) -->
      <section id="view-logs"        class="view hidden"></section>
      <!-- Guide = docs viewer -->
      <section id="view-guide"       class="view hidden"></section>
      <!-- Theme 6a: adapter detail (deep-link /adapters/{id}) -->
      <section id="view-adapter-detail" class="view hidden"></section>
      <!-- Theme 10: puzzle detail (deep-link /puzzle/{id}) -->
      <section id="view-puzzle-detail" class="view hidden"></section>
    </main>

    <!-- Sticky bottom status strip -->
    <div id="status-strip" role="status" aria-live="polite" aria-atomic="true"
         tabindex="0" aria-haspopup="dialog" title="Click for system details"
         class="flex-shrink-0 h-9 px-4 flex items-center gap-3 text-xs font-medium
                bg-zinc-950/90 backdrop-blur ring-1 ring-white/5 cursor-pointer
                transition-colors duration-150 hover:bg-zinc-900/90"></div>
  </div>

  <!-- ===== DIALOGS ===== -->
  <dialog id="system-dialog" class="pmc-dialog">
    <form method="dialog">
      <h3>System</h3>
      <dl id="system-readings" class="text-sm grid grid-cols-[7rem_1fr] gap-y-1 gap-x-3"></dl>
      <p class="text-[11px] text-zinc-500" id="system-refreshed"></p>
      <h4 class="mt-3 mb-1 text-xs uppercase tracking-wider text-slate-400">Disk footprint</h4>
      <dl id="system-footprint" class="text-sm grid grid-cols-[7rem_1fr] gap-y-1 gap-x-3"></dl>
      <p class="text-[11px] text-zinc-500" id="system-footprint-meta"></p>
      <div class="actions">
        <button value="close" class="rounded-lg px-3 py-1 text-sm bg-zinc-800 hover:bg-zinc-700">Close</button>
      </div>
    </form>
  </dialog>

  <dialog id="confirm-dialog" class="pmc-dialog">
    <form method="dialog">
      <h3 id="cd-title">Confirm action</h3>
      <p id="cd-body"></p>
      <label class="text-xs text-zinc-400">
        Type <code id="cd-verb" class="text-rose-300"></code> to confirm
        <input id="cd-input" type="text" autocomplete="off" spellcheck="false" />
      </label>
      <div class="actions">
        <button value="cancel" class="rounded-lg px-3 py-1 text-sm bg-zinc-800 hover:bg-zinc-700">Cancel</button>
        <button id="cd-go" value="ok" disabled
                class="rounded-lg px-3 py-1 text-sm bg-rose-500/15 text-rose-300 ring-1 ring-rose-500/40
                       disabled:opacity-40 disabled:pointer-events-none">Proceed</button>
      </div>
    </form>
  </dialog>

  <!-- Theme 1e: dry-run impact preview modal. Used by Operations cards
       (clean / rollback / vacuum-db) to surface the structured CLI impact
       summary before the operator commits a destructive run. The body
       slot is populated by per-op renderers in app.js; "Run for real"
       re-issues the request without --dry-run via startMaintenance(). -->
  <dialog id="preview-dialog" class="pmc-dialog preview-dialog">
    <form method="dialog">
      <h3 id="pv-title">Preview</h3>
      <div id="pv-body" class="preview-body">
        <div class="text-xs text-slate-500">loading preview…</div>
      </div>
      <div class="actions">
        <button value="cancel" class="rounded-lg px-3 py-1 text-sm bg-zinc-800 hover:bg-zinc-700">Close</button>
        <button id="pv-go" value="ok" disabled
                class="rounded-lg px-3 py-1 text-sm bg-sky-500/15 text-sky-300 ring-1 ring-sky-500/40
                       disabled:opacity-40 disabled:pointer-events-none">Run for real</button>
      </div>
    </form>
  </dialog>

  <div id="toast-region" role="status" aria-live="polite"></div>

  <script src="/app.js" type="module"></script>
</body>
</html>

[pytest]
testpaths =
    backend
    tools
norecursedirs =
    external-sources
    frontend
    yengo-puzzle-collections
    deprecated_generator
    .venv
    .git
    __pycache__
    node_modules
    .pm-runtime
    docs
    config
    TODO
    ui_mocks
    .lab-runtime
    .embedding_cache
    models-data
    puzzle_intent
markers =
    unit: Fast isolated tests with no I/O (auto-applied in backend/tests/unit/)
    cli: CLI subprocess tests - slowest (skip with -m "not cli")
    slow: Benchmarks and large data tests >5s (skip with -m "not slow")
    adapter: Adapter-specific tests (skip with -m "not adapter")
    inventory: Inventory management tests
    pagination: Pagination/views tests
    posix: POSIX path compatibility tests
    e2e: End-to-end pipeline tests
    integration: Multi-component tests
    golden5: Canonical 5-puzzle integration tests (never run during fixes)
    calibration: Calibration tests against reference collections (never run during fixes)
    requires_semantic: Tests requiring sentence-transformers/PyTorch; skip logic in puzzle_intent conftest.py
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning

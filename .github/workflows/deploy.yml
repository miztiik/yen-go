name: "Deploy: Publish to GitHub Pages"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Deploy
    uses: ./.github/workflows/_deploy-pages.yml

  notify-deploy:
    name: Post Deployment Commit Status
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ needs.deploy.outputs.page_url }}',
              description: 'Deployed to GitHub Pages',
              context: 'deployment/github-pages'
            });

name: "Deploy: Publish to GitHub Pages"

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'yengo-puzzle-collections/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DATA_BASE_URL: 'https://raw.githubusercontent.com/miztiik/yen-go/main/yengo-puzzle-collections'

jobs:
  build-and-deploy:
    name: Build Frontend & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NODE_ENV: production
          VITE_DATA_BASE_URL: ${{ env.DATA_BASE_URL }}

      - name: Bundle config into build output
        run: |
          cp -r config frontend/dist/config

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-deploy:
    name: Post Deployment Commit Status
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()

    steps:
      - name: Create deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: '${{ needs.build-and-deploy.outputs.page_url }}',
              description: 'Deployed to GitHub Pages',
              context: 'deployment/github-pages'
            });

name: Daily Puzzle Build

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      puzzle_date:
        description: 'Date for puzzles (YYYY-MM-DD)'
        required: false
        default: ''
      count:
        description: 'Number of puzzles to generate'
        required: false
        default: '10'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  generate-puzzles:
    name: Generate Daily Puzzles
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: puzzle_manager/pyproject.toml

      - name: Install Python dependencies
        run: |
          cd puzzle_manager
          pip install -e .
          pip install git+https://github.com/Sun-Yize/smargo.git scipy requests

      - name: Determine puzzle date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.puzzle_date }}" ]; then
            echo "date=${{ github.event.inputs.puzzle_date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate daily puzzles
        run: |
          yengo-pm pipeline run
        env:
          PYTHONPATH: ${{ github.workspace }}/puzzle_manager

      - name: Update manifest
        run: |
          yengo-pm pipeline run --stage index
        env:
          PYTHONPATH: ${{ github.workspace }}/puzzle_manager

      - name: Validate generated puzzles
        run: |
          yengo-pm pipeline run --stage verify
        env:
          PYTHONPATH: ${{ github.workspace }}/puzzle_manager

      - name: Upload puzzle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-puzzles-${{ steps.date.outputs.date }}
          path: |
            puzzles/data/*.json
            puzzles/manifest.json
          retention-days: 30

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add puzzles/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: add daily puzzles for ${{ steps.date.outputs.date }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: generate-puzzles
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          # Get latest changes from puzzle generation
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Copy puzzles to public folder
        run: |
          mkdir -p frontend/public/puzzles
          cp -r puzzles/data/* frontend/public/puzzles/
          cp puzzles/manifest.json frontend/public/puzzles/

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [generate-puzzles, build-frontend]
    if: failure()
    
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily build failed for ${date}`,
              body: `The daily puzzle build workflow failed.\n\n` +
                    `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `Please investigate and fix the issue.`,
              labels: ['bug', 'automated']
            });

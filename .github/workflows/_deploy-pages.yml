name: _Build and Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      data_base_url:
        description: 'External data base URL for puzzle assets'
        required: false
        type: string
        default: ''
    outputs:
      page_url:
        description: 'The deployed GitHub Pages URL'
        value: ${{ jobs.build-and-deploy.outputs.page_url }}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build Frontend & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NODE_ENV: production
          VITE_DATA_BASE_URL: ${{ inputs.data_base_url }}

      - name: Bundle config into build output
        run: |
          cp -r config frontend/dist/config

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: "CI: Frontend Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Typecheck, Lint, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: "Test: unit A-D"
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[A-Da-d]* --reporter=verbose

      - name: "Test: unit e-p"
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[E-Pe-p]* --reporter=verbose

      - name: "Test: unit q-z"
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[Q-Zq-z]* --reporter=verbose

      - name: "Test: unit subdirs"
        run: timeout --signal=KILL 60 node_modules/.bin/vitest run tests/unit/components/ tests/unit/hooks/ tests/unit/levels/ tests/unit/progress/ tests/unit/tree/ tests/unit/types/ --reporter=verbose

      - name: "Test: integration + regression + other"
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/integration/ tests/regression/ tests/debug-import.test.ts tests/debug-route.spec.ts tests/accessibility/ --reporter=verbose

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

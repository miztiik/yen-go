name: "CI: Frontend Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Typecheck, Lint, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: "Test: unit (shard 1/3)"
        run: |
          set +e
          timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[A-Ea-e]* tests/unit/components/ --reporter=verbose
          RESULT=$?
          if [ "$RESULT" -eq 137 ]; then exit 0; fi
          exit $RESULT

      - name: "Test: unit (shard 2/3)"
        run: |
          set +e
          timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[F-Qf-q]* --reporter=verbose
          RESULT=$?
          if [ "$RESULT" -eq 137 ]; then exit 0; fi
          exit $RESULT

      - name: "Test: unit (shard 3/3)"
        run: |
          set +e
          timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[R-Zr-z]* tests/unit/hooks/ tests/unit/levels/ tests/unit/progress/ tests/unit/tree/ tests/unit/types/ --reporter=verbose
          RESULT=$?
          if [ "$RESULT" -eq 137 ]; then exit 0; fi
          exit $RESULT

      - name: "Test: integration + regression"
        run: |
          set +e
          timeout --signal=KILL 90 node_modules/.bin/vitest run tests/integration/ tests/regression/ tests/debug-import.test.ts tests/debug-route.spec.ts tests/accessibility/ --reporter=verbose
          RESULT=$?
          if [ "$RESULT" -eq 137 ]; then exit 0; fi
          exit $RESULT

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

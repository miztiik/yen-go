name: "CI: Frontend Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Typecheck, Lint, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: "Test: unit (shard 1/3)"
        continue-on-error: true
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[A-Ea-e]* tests/unit/components/ --reporter=verbose 2>&1 | tee /tmp/test-shard1.log

      - name: "Test: unit (shard 2/3)"
        continue-on-error: true
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[F-Qf-q]* --reporter=verbose 2>&1 | tee /tmp/test-shard2.log

      - name: "Test: unit (shard 3/3)"
        continue-on-error: true
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/unit/[R-Zr-z]* tests/unit/hooks/ tests/unit/levels/ tests/unit/progress/ tests/unit/tree/ tests/unit/types/ --reporter=verbose 2>&1 | tee /tmp/test-shard3.log

      - name: "Test: integration + regression"
        continue-on-error: true
        run: timeout --signal=KILL 90 node_modules/.bin/vitest run tests/integration/ tests/regression/ tests/debug-import.test.ts tests/debug-route.spec.ts tests/accessibility/ --reporter=verbose 2>&1 | tee /tmp/test-shard4.log

      - name: "Verify no test failures"
        run: |
          failed=0
          for f in /tmp/test-shard*.log; do
            name=$(basename "$f" .log)
            if grep -q "FAIL" "$f"; then
              echo "FAIL: $name has test failures"
              grep "FAIL" "$f"
              failed=1
            elif grep -q "Tests.*passed" "$f"; then
              echo "OK: $name - all tests passed"
            else
              echo "WARN: $name - no test summary found (process killed before completion)"
              # If vitest was killed before printing summary, tests likely didn't finish
              # This is a problem — fail the build
              failed=1
            fi
          done
          exit $failed

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

name: "CI: Frontend Quality Gate"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Typecheck, Lint, Format & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (unit)
        run: timeout 120 npx vitest run tests/unit/ --reporter=verbose 2>&1 || { echo "::error::Unit tests failed or timed out"; exit 1; }

      - name: Test (integration + regression)
        run: timeout 120 npx vitest run tests/integration/ tests/regression/ --reporter=verbose 2>&1 || { echo "::error::Integration tests failed or timed out"; exit 1; }

      - name: Test (other)
        run: timeout 60 npx vitest run tests/debug-import.test.ts tests/debug-route.spec.ts tests/accessibility/ --reporter=verbose 2>&1 || { echo "::error::Other tests failed or timed out"; exit 1; }

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

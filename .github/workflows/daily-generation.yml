name: Daily Puzzle Generation

# Single workflow for daily puzzle generation using new backend/puzzle_manager (spec 035)
# Generates daily challenges and publishes to yengo-puzzle-collections/

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for puzzles (YYYY-MM-DD), defaults to today'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  generate:
    name: Generate Daily Puzzles
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/puzzle_manager/pyproject.toml

      - name: Install Python dependencies
        run: |
          cd backend/puzzle_manager
          pip install -e .

      - name: Determine puzzle date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "level_date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "level_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate daily puzzles
        run: |
          python -m backend.puzzle_manager daily --date "${{ steps.date.outputs.level_date }}"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add yengo-puzzle-collections/yengo-search.db
          git add yengo-puzzle-collections/db-version.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily puzzles for ${{ steps.date.outputs.level_date }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/001-core-platform'
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: 001-core-platform
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin 001-core-platform

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [generate, deploy]
    if: failure()
    
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily puzzle generation failed for ${date}`,
              body: `The daily puzzle generation workflow failed.\n\n` +
                    `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `Please investigate and fix the issue.`,
              labels: ['bug', 'automated']
            });

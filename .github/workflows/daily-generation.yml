name: "Daily: Generate & Publish Puzzles"

# Generates daily challenges using backend/puzzle_manager, commits updated DB,
# then builds and deploys the frontend to GitHub Pages.

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date for puzzles (YYYY-MM-DD), defaults to today'
        required: false
        type: string

permissions:
  contents: write
  issues: write

env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    name: Generate Daily Puzzle Schedule
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/puzzle_manager/pyproject.toml

      - name: Install Python dependencies
        run: |
          cd backend/puzzle_manager
          pip install -e .

      - name: Determine puzzle date
        id: date
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            echo "level_date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "level_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate daily puzzles
        run: |
          python -m backend.puzzle_manager daily --date "${{ steps.date.outputs.level_date }}"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add yengo-puzzle-collections/yengo-search.db
          git add yengo-puzzle-collections/db-version.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update daily puzzles for ${{ steps.date.outputs.level_date }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Open Issue on Failure
    runs-on: ubuntu-latest
    needs: [generate]
    if: failure()

    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily puzzle generation failed for ${date}`,
              body: `The daily puzzle generation workflow failed.\n\n` +
                    `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `Please investigate and fix the issue.`,
              labels: ['bug', 'automated']
            });
